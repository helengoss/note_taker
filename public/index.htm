<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data List</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Notes & Ideas</h1>
        <ul id="data-list"></ul>

            <button type="submit" style="background-color:#3ecfba; padding:2px 4px; min-width:0; width:auto; box-sizing:border-box;">stick</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>

</html>
